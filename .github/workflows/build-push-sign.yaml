name: Build Push Scan Sign Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-push-sign:
    name: Build, scan, SBOM, push, and sign Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        shell: bash
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LC}/devsecops-demo" >> "$GITHUB_OUTPUT"
          echo "local_image=devsecops-demo:ci" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha
          labels: |
            org.opencontainers.image.title=devsecops-demo
            org.opencontainers.image.description=DevSecOps demo service
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build image locally for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          load: true
          push: false
          tags: ${{ steps.image.outputs.local_image }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.image.outputs.local_image }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: "HIGH,CRITICAL"
          vuln-type: "os,library"
          scanners: "vuln"

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM with Syft
        run: |
          syft ${{ steps.image.outputs.local_image }} -o cyclonedx-json=sbom-cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom-cyclonedx.json

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Show pushed image reference
        run: |
          echo "${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image by digest
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}"
      
      - name: Attest SBOM to image
        env:
          COSIGN_YES: "true"
        run: |
          cosign attest \
            --predicate sbom-cyclonedx.json \
            --type cyclonedx \
            "${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Verify SBOM attestation
        run: |
          cosign verify-attestation \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --type cyclonedx \
            "${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Verify signed image
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}"