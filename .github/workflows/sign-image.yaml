name: Sign Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to sign"
        required: true
        default: "latest"
  workflow_run:
    workflows: ["Build and Push Image"]
    types:
      - completed

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  sign:
    name: Sign container image with Cosign
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Set lowercase image name
        id: image
        shell: bash
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LC}/devsecops-demo" >> "$GITHUB_OUTPUT"

      - name: Determine image reference
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="latest"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=${{ steps.image.outputs.image }}:$TAG" >> "$GITHUB_OUTPUT"

      - name: Sign image keylessly
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "${{ steps.ref.outputs.image }}"

      - name: Verify signed image
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.ref.outputs.image }}"